<!--Create following table structure in HTML page. (Table inside table)
1 2
3 4
5 6
1 2
3 4
5 6
1 2
3 4
5 6
1 2
3 4
5 6
-->
<!DOCTYPE html>
<html>
<head>
    <title>Nested Table</title>
</head>
<body>

<table border="1">
    <tr>
        <td>
            <table border="1">
                <tr><td>1</td><td>2</td></tr>
                <tr><td>3</td><td>4</td></tr>
                <tr><td>5</td><td>6</td></tr>
            </table>
        </td>
        <td>
            <table border="1">
                <tr><td>1</td><td>2</td></tr>
                <tr><td>3</td><td>4</td></tr>
                <tr><td>5</td><td>6</td></tr>
            </table>
        </td>
    </tr>
    <tr>
        <td>
            <table border="1">
                <tr><td>1</td><td>2</td></tr>
                <tr><td>3</td><td>4</td></tr>
                <tr><td>5</td><td>6</td></tr>
            </table>
        </td>
        <td>
            <table border="1">
                <tr><td>1</td><td>2</td></tr>
                <tr><td>3</td><td>4</td></tr>
                <tr><td>5</td><td>6</td></tr>
            </table>
        </td>
    </tr>
</table>

</body>
</html>
