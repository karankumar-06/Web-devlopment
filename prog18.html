<!--Create a HTML page to display a gallery page which contains many scrollable images. 
(Total 3 rows) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <title>scrollable image</title>
</head>
<body>
    <img src="solarsystem.jpg" alt="s">
    <marquee behavior="scrollable" direction="15">
        <img src="sun.jpg" alt="s" width="50px">
        <img src="mercury.jpg" alt="m" width="50px">
        <img src="venus.jpg" alt="v" width="50px"><br><br>
        <img src="earth.jpg" alt="e" width="50px">
        <img src="mars.jpg" alt="m" width="50px">
        <img src="jupiter.jpg" alt="j" width="50px"><br><br>
        <img src="saturn.jpg" alt="S" width="50px">
        <img src="uranus.jpg" alt="u" width="50px">
        <img src="neptune.jpg" alt="n" width="50px">
    </marquee>
</body>
</html>
