<!--Create a table with appropriate formatting. The following table shows population 
growth in billion.
2020 2021 2022
Canada 1.3 1.5 1.8
London 0.09 0.45 1.1
Australia 1.9 2.2 2.4
India 2.44 3.21 3.62-->
<!DOCTYPE html>
<html lang="en">
<head>
    <title>table</title>
</head>
<body>
    <table border="1">
        <caption>Population Growth (in Billions) from 2020–2022</caption>
        <tr>
            <th>Country/Region</th>
            <th>2020</th>
            <th>2021</th>
            <th>2022</th>
        </tr>
        <tr>
            <td>Canada</td>
            <td>1.3</td>
            <td>1.5</td>
            <td>1.8</td>
        </tr>
        <tr>
            <td>London</td>
            <td>0.09</td>
            <td>0.45</td>
            <td>1.1</td>
        </tr>
        <tr>
            <td>Australia</td>
            <td>1.9</td>
            <td>2.2</td>
            <td>2.4</td>
        </tr>
        <tr>
            <td>India</td>
            <td>2.44</td>
            <td>3.21</td>
            <td>3.62</td>
        </tr>
    </table>
</body>
</html>
