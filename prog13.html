<!--Develop HTML page to make clickable image. (Image link) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <title>image map</title>
</head>
<body>
    <img src="solarsystem.jpg" alt="solarsystem" usemap="#solarsystem">
    <map name="solarsystem">
        
        <area shape="rect" coords="34,99,41,108" href="mercury.jpg" alt="mercury">
        <area shape="rect" coords="42,95,50,106" href="venus.jpg" alt="venus">
        <area shape="rect" coords="51,93,62,103" href="earth.jpg" alt="earth">
        <area shape="rect" coords="63,93,72,102" href="mars.jpg" alt="mars">
        <area shape="rect" coords="92,68,134,102" href="jupiter.jpg" alt="jupiter">
        <area shape="rect" coords="136,63,186,98" href="saturn.jpg" alt="saturn">
        <area shape="rect" coords="185,53,210,83" href="uranus.jpg" alt="uranus">
        <area shape="rect" coords="214,50,239,67" href="neptune.jpg" alt="neptune">
        <area shape="rect" coords="0,38,19,173" href="sun.jpg" alt="sun">
    </map>
</body>
</html>
