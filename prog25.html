<!--Create the following table in HTML with using colspan and rowspan. Also Apply
backgroundcolor in table.
Column 1 Column 2 Column 3
Row 1
Cell 1
Row 1 Cell 2 Row 1 Cell 3
Row 2 Cell 2 Row 2 Cell 3
Row 3 Cell 1-->
<!DOCTYPE html>
<html>
<head>
<title>Table with Rowspan and Colspan</title>
</head>
<body>

<table border="1">

<tr>
    <th>Column 1</th>
    <th>Column 2</th>
    <th>Column 3</th>
</tr>

<tr>
    <td rowspan="2">Row 1 Cell 1</td>
    <td>Row 1 Cell 2</td>
    <td>Row 1 Cell 3</td>
</tr>

<tr>
    <td colspan="1">Row 2 Cell 2</td>
    <td colspan="1">Row 2 Cell 3</td>
</tr>

<tr>
    <td colspan="3"><center>Row 3 Cell 1</center></td>
</tr>

</table>

</body>
</html>
