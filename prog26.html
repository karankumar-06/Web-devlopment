<!DOCTYPE html>
<html lang="en">
<head>
    <title>table</title>
</head>
<body>
    <table border="1">
        <tr>
            <th colspan="2"><center>This is caption</center></th>
        </tr>
        <tr>
            <td>row 1 column 1</td>
            <td>row 1 column 2</td>
        </tr>
        <tr>
            <td>row 2 column 1</td>
            <td>row 2 column 2</td>
        </tr>
    </table>
</body>
</html>
