<!--Create following table in HTML with border and other formatting as per your
requirement. Also apply cell spacing and cell padding.
Name
Sunny Sharma
Ravi Verma
Salary
50000
70000-->
<!DOCTYPE html>
<html lang="en">
<head>
    <title>table</title>
</head>
<body>
    <table border="1" cellpadding="10" cellspacing="10">
        <tr>
            <th>Name</th>
            <th>Salary</th>
        </tr>
        <tr>
            <td>Sunny Sharma</td>
            <td>50000</td>
        </tr>
        <tr>
            <td>Ravi Verma</td>
            <td>70000</td>
        </tr>
    </table>
</body>
</html>
