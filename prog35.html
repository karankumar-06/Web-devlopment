<!--Create an HTML page to use few special characters in your page. (like ¥ → ↓ © ® etc).-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Special Characters Demo</title>
</head>
<body>

    <h1>Special Characters in HTML</h1>

    <p>Yen Symbol: &yen; (¥)</p>
    <p>Copyright: &copy; (©)</p>
    <p>Registered: &reg; (®)</p>
    <p>Trademark: &trade; (™)</p>

    <p>Arrow Right: &rarr; (→)</p>
    <p>Arrow Left: &larr; (←)</p>
    <p>Arrow Up: &uarr; (↑)</p>
    <p>Arrow Down: &darr; (↓)</p>

    <p>Heart Symbol: &hearts; (♥)</p>
    <p>Euro Symbol: &euro; (€)</p>
    <p>Degree Symbol: &deg; (°)</p>

    <hr>

    <p>Using Numeric Codes:</p>
    <p>&#165; &#169; &#174; &#8594; &#8592; &#8593; &#8595;</p>

</body>
</html>
