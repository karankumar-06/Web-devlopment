<!--Display a list of countries with proper bullets / numbering.-->
<!DOCTYPE html>
<html lang="en">
<head>
    <title>bullets and numbering</title>
</head>
<body>
    <h2>Countries showing by numbering</h2>
    <ol>
        <li>India</li>
        <li>Australia</li>
        <li>China</li>
        <li>U.S.A</li>
    </ol><br>
    <h2>Countries showing by bullets</h2>
    <ul>
        <li>India</li>
        <li>Australia</li>
        <li>China</li>
        <li>U.S.A</li>
    </ul>
</body>
</html>
